<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mari só Mari?</title>

<style>

/* INTRO PRETA */
#intro{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:999;
transition:1s;
}

/* FUNDO */
body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at center, #0a1f4d 0%, #050a1f 70%, #000 100%);
color:white;
overflow-x:hidden;
}

/* brilho */
body::after{
content:"";
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle, rgba(77,166,255,0.15), transparent 70%);
pointer-events:none;
}

/* estrelas */
.stars{
position:fixed;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
opacity:0;
transition:2s;
}

/* central */
.container{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

/* lâmpada */
.lamp-container{
cursor:pointer;
display:flex;
flex-direction:column;
align-items:center;
}

.lamp{
position:relative;
width:120px;
height:150px;
}

.light{
width:120px;
height:60px;
background:radial-gradient(circle, #222 0%, transparent 70%);
border-radius:60px 60px 20px 20px;
position:absolute;
top:0;
transition:1s;
}

.base{
width:20px;
height:70px;
background:#ccc;
position:absolute;
top:60px;
left:50%;
transform:translateX(-50%);
border-radius:10px;
}

.cord{
width:2px;
height:40px;
background:#aaa;
position:absolute;
top:60px;
left:50%;
transform:translateX(-50%);
}

/* conteúdo */
.hidden{
display:none;
}

#conteudo{
opacity:0;
transition:1.5s;
}

/* card */
.card{
background:rgba(255,255,255,0.02);
padding:30px 80px;
border-radius:20px;
backdrop-filter:blur(25px);
box-shadow:0 0 60px rgba(77,166,255,0.15);
}

/* frases */
#frase{
margin-top:30px;
font-size:22px;
opacity:0;
transition:1s;
min-height:40px;
cursor:pointer; /* 👈 agora indica que pode clicar */
}

/* botão */
button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:20px;
background:#4da6ff;
color:white;
cursor:pointer;
}

/* confete */
.confetti{
position:fixed;
width:4px;
height:4px;
top:-10px;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(100vh);}
}

/* partículas */
.particle{
position:fixed;
width:3px;
height:3px;
background:#66b3ff;
border-radius:50%;
opacity:0.4;
animation:float linear infinite;
}

@keyframes float{
to{transform:translateY(-100vh);}
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<div class="lamp-container" onclick="start()">
<div class="lamp">
<div class="light" id="light"></div>
<div class="base"></div>
<div class="cord"></div>
</div>
<p style="opacity:0.6;">toque para acender ✨</p>
</div>
</div>

<div class="stars" id="stars"></div>

<div class="container">

<div id="conteudo" class="hidden">

<div class="card">

<h1>Marianne 💙</h1>

<button onclick="musica()">🎶 ouça</button>

<div id="frase"></div>

<p style="margin-top:40px;">
Aproveita muito seu dia, que seja incrível, cheio de amor, risada e carinho<br><br>
Feliz Aniversário! 💙
</p>

</div>

</div>

</div>

<script>

/* SUAS FRASES */
const frases = [
"pra você nao esquecer",
"sua voz é como a guitarra solo de 'November Rain' de Guns N' Roses tocada às 7:10",
"sua falta de memoria me lembra o filme 'como se fosse a primeira vez'",
"suco de manga é muito bom",
"seu humor é invejável",
"você vai conhecer a billie e muito provavelmente ela vai se apaixonar pelos seus olhos",
"se você fosse um cachorro, seria o golden",
"eu teria um golden",
"você é incrivelmente forte, e isso é inspirador",
];

let i = 0;
let pausado = false;
let intervalo;

/* START */
function start(){

const light = document.getElementById("light");

light.style.background = "radial-gradient(circle, #fff 0%, #ffe680 40%, transparent 80%)";
light.style.boxShadow = "0 0 200px #ffe680";

setTimeout(()=>{

document.getElementById("intro").style.opacity = 0;

setTimeout(()=>{
document.getElementById("intro").style.display = "none";

const conteudo = document.getElementById("conteudo");
conteudo.classList.remove("hidden");
conteudo.style.opacity = 1;

document.getElementById("stars").style.opacity = 1;

iniciarFrases();
confete();
poeira();

},800);

},800);
}

/* LOOP DAS FRASES */
function iniciarFrases(){

mostrarFrase();

intervalo = setInterval(()=>{
if(!pausado){
i = (i + 1) % frases.length;
mostrarFrase();
}
},3000);
}

function mostrarFrase(){
const el = document.getElementById("frase");

el.style.opacity = 0;

setTimeout(()=>{
el.innerHTML = frases[i];
el.style.opacity = 1;
},300);
}

/* 👇 CLIQUE SÓ NA FRASE = PAUSA */
document.getElementById("frase").addEventListener("click", ()=>{
pausado = !pausado;
});

/* CONFETE */
function confete(){
setInterval(()=>{
const c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background=["#4da6ff","#3399ff","#66b3ff"][Math.floor(Math.random()*3)];
c.style.animationDuration=(Math.random()*3+2)+"s";
document.body.appendChild(c);
setTimeout(()=>c.remove(),4000);
},150);
}

/* PARTÍCULAS */
function poeira(){
setInterval(()=>{
const p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(Math.random()*6+4)+"s";
document.body.appendChild(p);
setTimeout(()=>p.remove(),10000);
},200);
}

/* MÚSICA */
function musica(){
window.open("https://open.spotify.com/episode/2r2rNqR3Km8yDtv3cNgXCY", "_blank");
}

</script>

</body>
</html>
