<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marianne 💙</title>

    <style>
        body {
            background: radial-gradient(circle at center, #0a1f4d 0%, #050a1f 100%);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            width: 90%;
            padding: 40px 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 30px;
            border: 1px solid rgba(77, 166, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            text-align: center;
            z-index: 5;
            position: relative;
        }

        h1, h2 {
            color: #4da6ff;
            text-shadow: 0 0 15px rgba(77, 166, 255, 0.5);
        }

        .hidden { display: none; }

        button {
            background: #4da6ff;
            color: #050a1f;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 20px 0;
            box-shadow: 0 4px 15px rgba(77, 166, 255, 0.3);
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #4da6ff;
        }

        #frase {
            font-size: 20px;
            min-height: 80px;
            margin: 30px 0;
            transition: opacity 0.8s ease;
            font-style: italic;
            color: #a3d2ff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .confetti {
            position: fixed;
            width: 8px;
            height: 8px;
            top: -10px;
            z-index: 1;
            pointer-events: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            from { transform: translateY(0) rotate(0deg); }
            to { transform: translateY(110vh) rotate(720deg); }
        }

        #countdown {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-top: 20px;
            color: #4da6ff;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="lock">
            <h1>💙 Algo está sendo preparado...</h1>
            <p>Aguarde o momento especial:</p>
            <div id="countdown">Carregando...</div>
        </div>

        <div id="content" class="hidden">
            <h1>Marianne 💙</h1>
            <button onclick="window.open('https://open.spotify.com/episode/2r2rNqR3Km8yDtv3cNgXCY', '_blank')">
                🎶 Ouvir a música
            </button>

            <h2>📝 Coisas que admiro em você</h2>
            <div id="frase"></div>

            <h2>💌</h2>
            <p>
                Aproveita muito seu dia, que seja incrível, cheio de amor, risada e carinho.<br><br>
                Obrigada por deixar eu te conhecer e você é foda, feliz seu dia!<br><br>
                <strong>Feliz aniversário, meu bem. 💙</strong>
            </p>
        </div>
    </div>

    <script>
        // Ajuste aqui a data do aniversário dela (Ano-Mês-Dia)
        const releaseDate = new Date("2025-02-02T00:00:00-03:00");

        function update() {
            const now = new Date();
            const diff = releaseDate - now;

            if (diff <= 0) {
                document.getElementById("lock").style.display = "none";
                document.getElementById("content").classList.remove("hidden");
                iniciarFrases(); 
                iniciarConfetes();
                clearInterval(timerInterval);
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / (1000 * 60)) % 60);
            const s = Math.floor((diff / 1000) % 60);
            document.getElementById("countdown").innerHTML = `${d}d ${h}h ${m}m ${s}s`;
        }

        const timerInterval = setInterval(update, 1000);
        update();

        const frases = [
            "Sua autenticidade, você é genuína e isso é inspirador.",
            "A forma espontânea como você encara a vida.",
            "Sua força e a determinação que você carrega.",
            "A sua forma de pensar"
            "Sua voz é como a guitarra solo de 'November Rain' de Guns N' Roses.",
            "Eu não menti quando falei que faria um poscast com seus áudios, eu ouviria eles o dia inteiro."
        ];

        let index = 0;
        const fraseEl = document.getElementById("frase");

        function mostrarProximaFrase() {
            fraseEl.style.opacity = 0;
            setTimeout(() => {
                index = (index + 1) % frases.length;
                fraseEl.innerHTML = frases[index];
                fraseEl.style.opacity = 1;
            }, 800);
        }

        function iniciarFrases() {
            fraseEl.innerHTML = frases[0];
            fraseEl.style.opacity = 1;
            setInterval(mostrarProximaFrase, 4500); 
        }

        function iniciarConfetes() {
            setInterval(() => {
                const el = document.createElement("div");
                el.className = "confetti";
                el.style.left = Math.random() * 100 + "vw";
                el.style.background = ["#4da6ff", "#3399ff", "#ffffff", "#b3d9ff"][Math.floor(Math.random() * 4)];
                el.style.borderRadius = "50%";
                el.style.animationDuration = (Math.random() * 3 + 2) + "s";
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 5000);
            }, 200);
        }
    </script>
</body>
</html>
