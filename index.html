<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mari só Mari?</title>

<style>
  #intro{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
z-index:999;
}

#introText{
color:white;
font-size:28px;
opacity:0;
animation:fadeIntro 4s ease forwards;
}

@keyframes fadeIntro{
0%{opacity:0; transform:scale(0.9);}
30%{opacity:1;}
70%{opacity:1;}
100%{opacity:0; transform:scale(1.1);}
}

/* FUNDO */
body{
<div id="intro">
  <h1 id="introText">buu👻...</h1>
</div>
margin:0;
font-family:Arial;
background:#000;
color:white;
overflow:hidden;
transition:1.5s;
}

/* ESTRELAS */
.stars{
position:fixed;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
opacity:0;
transition:2s;
}

/* CENTRAL */
.container{
position:relative;
z-index:2;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

/* LÂMPADA */
.lamp-container{
cursor:pointer;
display:flex;
flex-direction:column;
align-items:center;
}

.lamp{
position:relative;
width:120px;
height:150px;
}

.light{
width:120px;
height:60px;
background:radial-gradient(circle, #222 0%, transparent 70%);
border-radius:60px 60px 20px 20px;
position:absolute;
top:0;
left:0;
transition:1s;
}

.base{
width:20px;
height:70px;
background:#ccc;
position:absolute;
top:60px;
left:50%;
transform:translateX(-50%);
border-radius:10px;
}

.cord{
width:2px;
height:40px;
background:#aaa;
position:absolute;
top:60px;
left:50%;
transform:translateX(-50%);
}

/* CONTEÚDO */
.hidden{
display:none;
}

.card{
background:rgba(255,255,255,0.08);
padding:30px 70px;
border-radius:10px;
backdrop-filter:blur(15px);
animation:fadeUp 2s ease;
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(30px);}
to{opacity:1; transform:translateY(0);}
}

/* FRASES */
#frase{
max-width: 700px;
margin: auto;
margin-top:30px;
font-size:22px;
opacity:0;
transition:1s;
min-height:40px;
}

/* BOTÃO */
button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:20px;
background:#4da6ff;
cursor:pointer;
color:white;
font-weight:bold;
}

/* CONFETE */
.confetti{
position:fixed;
width:4px;
height:4px;
top:-10px;
animation:fall linear infinite;
}

@keyframes fall{
from{transform:translateY(0);}
to{transform:translateY(100vh);}
}

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="container">

<!-- TELA INICIAL -->
<div id="inicio">

<div class="lamp-container" onclick="start()">

  <div class="lamp">
    <div class="light" id="light"></div>
    <div class="base"></div>
    <div class="cord"></div>
  </div>

  <p style="margin-top:20px;">toque para acender ✨</p>

</div>

</div>

<!-- CONTEÚDO -->
<div id="conteudo" class="hidden">

<div class="card">

<h1>Marianne 💙</h1>

<button onclick="musica()">🎶 ouça</button>

<div id="frase"></div>

<p style="margin-top:40px;">
Aproveita muito seu dia, que seja incrível, cheio de amor, risada e carinho<br><br>
                         Feliz Aniversário! 💙<br><br>
</p>

</div>

</div>

</div>

<script>

/* FRASES */
const frases = [
"pra você nao esquecer",
"sua voz é como a guitarra solo de 'November Rain' de Guns N' Roses tocada às 7:10",
"sua falta de memoria me lembra o filme 'como se fosse a primeira vez'",
"suco de manga é muito bom",
"seu humor é invejável",
"você vai conhecer a billie e muito provavelmente ela vai se apaixonar pelos seus olhos",
"se você fosse um cachorro, seria o golden",
"eu teria um golden",
"você é incrivelmente forte, e isso é inspirador",
];

let i = 0;

/* START CINEMATOGRÁFICO */
function start(){

// acende luz suave
const light = document.getElementById("light");
light.style.background = "radial-gradient(circle, #fff 0%, #ffe680 40%, transparent 80%)";
light.style.boxShadow = "0 0 120px #ffe680";

// delay dramático
setTimeout(()=>{
document.body.style.background="#050a1f";
document.getElementById("stars").style.opacity=1;
},600);

// mostrar conteúdo depois
setTimeout(()=>{
document.getElementById("inicio").style.display="none";
document.getElementById("conteudo").classList.remove("hidden");

frasesLoop();
confete();

},1500);

}

/* FRASES */
function frasesLoop(){
const el = document.getElementById("frase");

setInterval(()=>{
el.style.opacity=0;

setTimeout(()=>{
el.innerHTML=frases[i];
el.style.opacity=1;
i=(i+1)%frases.length;
},500);

},3000);
}

/* MÚSICA */
function musica(){
window.open("https://open.spotify.com/episode/2r2rNqR3Km8yDtv3cNgXCY", "_blank");
}

/* CONFETE */
function confete(){
setInterval(()=>{
const c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background=["#4da6ff","#3399ff","#66b3ff","#1a75ff"][Math.floor(Math.random()*4)];
c.style.animationDuration=(Math.random()*3+2)+"s";
document.body.appendChild(c);
setTimeout(()=>c.remove(),4000);
},150);
}

</script>

</body>
</html>
