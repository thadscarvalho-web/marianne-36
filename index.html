<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marianne 💙</title>

<style>

body{
margin:0;
font-family:Arial;
background:#000;
color:white;
overflow:hidden;
transition:1s;
}

/* estrelas */
.stars{
position:fixed;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
opacity:0;
transition:1s;
}

/* container */
.container{
position:relative;
z-index:2;
text-align:center;
top:50%;
transform:translateY(-50%);
padding:20px;
}

/* botão luz */
.lamp{
font-size:40px;
cursor:pointer;
margin-top:30px;
}

/* conteúdo */
.hidden{
display:none;
}

/* card */
.card{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:20px;
backdrop-filter:blur(10px);
}

/* frases */
#frase{
margin-top:30px;
font-size:22px;
opacity:0;
transition:1s;
}

/* botão música */
button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:20px;
background:#4da6ff;
cursor:pointer;
}

/* confete */
.confetti{
position:fixed;
width:6px;
height:6px;
top:-10px;
animation:fall linear infinite;
}

@keyframes fall{
from{transform:translateY(0);}
to{transform:translateY(100vh);}
}

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="container">

<div id="inicio">
<h1>💙</h1>
<p>toque para começar</p>

<div class="lamp" onclick="start()">💡</div>
</div>

<div id="conteudo" class="hidden">

<div class="card">

<h1>Marianne 💙</h1>

<button onclick="musica()">🎶 nossa música</button>

<div id="frase"></div>

<p style="margin-top:40px;">
Aproveita muito seu dia, que seja incrível, cheio de amor, risada e carinho<br><br>
Obrigada por deixar eu te conhecer, você é foda, feliz seu dia!<br><br>
Feliz aniversário, meu bem. 💙
</p>

</div>

</div>

</div>

<script>

const frases = [
"Marianne 💙",
"A memória de Dory 🐠",
"Seu susto fácil 😂",
"Sua criatividade",
"Seu senso de humor",
"Sua leveza",
"O brilho nos seus olhos ✨",
"O pé pra fora da cama 🫣",
"O livro que você escreve 📖",
"Sua risada",
"Sua espontaneidade",
"E tudo que você é",
"Sua voz é como a guitarra solo de November Rain de Guns N Roses.",
"Feliz aniversário 💙"
];

let i = 0;

function start(){
document.body.style.background="#050a1f";
document.getElementById("stars").style.opacity=1;

document.getElementById("inicio").style.display="none";
document.getElementById("conteudo").classList.remove("hidden");

musica();
frasesLoop();
confete();
}

function frasesLoop(){
const el = document.getElementById("frase");

setInterval(()=>{
el.style.opacity=0;

setTimeout(()=>{
el.innerHTML=frases[i];
el.style.opacity=1;
i=(i+1)%frases.length;
},500);

},3000);
}

function musica(){
window.open("https://open.spotify.com/track/0PgsB53yhlKs8D19LgYU4i", "_blank");
}

function confete(){
setInterval(()=>{
const c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background=["#4da6ff","#3399ff","#66b3ff"][Math.floor(Math.random()*3)];
c.style.animationDuration=(Math.random()*3+2)+"s";
document.body.appendChild(c);
setTimeout(()=>c.remove(),4000);
},150);
}

</script>

</body>
</html>
