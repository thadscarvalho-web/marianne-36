<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mari só Mari?</title>

<style>

/* INTRO */
#intro{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
z-index:999;
}

#introText{
color:white;
font-size:28px;
opacity:0;
animation:fadeIntro 4s ease forwards;
}

@keyframes fadeIntro{
0%{opacity:0; transform:scale(0.9);}
30%{opacity:1;}
70%{opacity:1;}
100%{opacity:0; transform:scale(1.1);}
}

/* FUNDO CINEMA */
body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at center, #0a1f4d 0%, #050a1f 70%, #000 100%);
color:white;
overflow-x:hidden;
transition:1.5s;
}

body::after{
content:"";
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle, rgba(77,166,255,0.15), transparent 70%);
pointer-events:none;
}

/* ESTRELAS */
.stars{
position:fixed;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
opacity:0;
transition:2s;
}

/* CENTRAL */
.container{
position:relative;
z-index:2;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

/* LÂMPADA */
.lamp-container{
cursor:pointer;
display:flex;
flex-direction:column;
align-items:center;
}

.lamp{
position:relative;
width:120px;
height:150px;
}

.light{
width:120px;
height:60px;
background:radial-gradient(circle, #222 0%, transparent 70%);
border-radius:60px 60px 20px 20px;
position:absolute;
top:0;
left:0;
transition:1s;
}

.base{
width:20px;
height:70px;
background:#ccc;
position:absolute;
top:60px;
left:50%;
transform:translateX(-50%);
border-radius:10px;
}

.cord{
width:2px;
height:40px;
background:#aaa;
position:absolute;
top:60px;
left:50%;
transform:translateX(-50%);
}

/* CARD */
.card{
background:rgba(255,255,255,0.02);
padding:30px 80px;
border-radius:20px;
backdrop-filter:blur(25px);
box-shadow:0 0 60px rgba(77,166,255,0.15);
}

/* FRASES */
#frase{
max-width:700px;
margin:auto;
margin-top:30px;
font-size:22px;
opacity:0;
transition:1s;
min-height:40px;
}

/* BOTÃO */
button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:20px;
background:#4da6ff;
cursor:pointer;
color:white;
}

/* CONFETE */
.confetti{
position:fixed;
width:4px;
height:4px;
top:-10px;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(100vh);}
}

/* PARTÍCULAS */
.particle{
position:fixed;
width:3px;
height:3px;
background:#66b3ff;
border-radius:50%;
opacity:0.4;
animation:float linear infinite;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-100vh);}
}

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="container">

<div id="inicio">
<div class="lamp-container" onclick="start()">
<div class="lamp">
<div class="light" id="light"></div>
<div class="base"></div>
<div class="cord"></div>
</div>
<p>toque para acender ✨</p>
</div>
</div>

<div id="conteudo" class="hidden">
<div class="card">
<h1>Marianne 💙</h1>
<button onclick="musica()">🎶 ouça</button>
<div id="frase"></div>
</div>
</div>

</div>

<script>

/* FRASES */
const frases = [
"pra você nao esquecer",
"sua voz é como a guitarra solo de November Rain",
"sua falta de memória me lembra como se fosse a primeira vez",
"seu humor é invejável",
"você vai conhecer a billie",
"seus olhos são absurdos",
"você é incrivelmente forte",
];

let i = 0;
let pausado = false;
let intervalo;

/* START */
function start(){

const light = document.getElementById("light");
light.style.background = "radial-gradient(circle, #fff 0%, #ffe680 40%, transparent 80%)";
light.style.boxShadow = "0 0 120px #ffe680";

setTimeout(()=>{
document.getElementById("inicio").style.display="none";
document.getElementById("conteudo").classList.remove("hidden");
document.getElementById("stars").style.opacity=1;

iniciarFrases();
confete();
poeira();

},1200);
}

/* FRASES LOOP */
function iniciarFrases(){
mostrarFrase();

intervalo = setInterval(()=>{
if(!pausado){
proximaFrase();
}
},3000);
}

function mostrarFrase(){
const el = document.getElementById("frase");

el.style.opacity = 0;

setTimeout(()=>{
el.innerHTML = frases[i];
el.style.opacity = 1;
},300);
}

function proximaFrase(){
i = (i + 1) % frases.length;
mostrarFrase();
}

/* 👉 CLIQUE = PAUSA / DESPAUSA */
document.body.addEventListener("click", ()=>{
pausado = !pausado;
});

/* CONFETE */
function confete(){
setInterval(()=>{
const c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background=["#4da6ff","#3399ff","#66b3ff"][Math.floor(Math.random()*3)];
c.style.animationDuration=(Math.random()*3+2)+"s";
document.body.appendChild(c);
setTimeout(()=>c.remove(),4000);
},150);
}

/* PARTÍCULAS */
function poeira(){
setInterval(()=>{
const p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(Math.random()*6+4)+"s";
document.body.appendChild(p);
setTimeout(()=>p.remove(),10000);
},200);
}

/* MÚSICA */
function musica(){
window.open("https://open.spotify.com", "_blank");
}

</script>

</body>
</html>
