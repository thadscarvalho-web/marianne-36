<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mari só Mari?</title>

    <style>
        /* Estilo Global e Fundo Estelar */
        body {
            background: radial-gradient(circle at center, #0a1f4d 0%, #050a1f 100%);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Card de conteúdo com efeito blur (vidro) */
        .container {
            max-width: 600px;
            width: 90%;
            margin: 20px;
            padding: 40px 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 30px;
            border: 1px solid rgba(77, 166, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            text-align: center;
            z-index: 1;
        }

        h1, h2 {
            color: #4da6ff;
            text-shadow: 0 0 15px rgba(77, 166, 255, 0.5);
        }

        .hidden { display: none; }

        /* Botão Moderno */
        button {
            background: #4da6ff;
            color: #050a1f;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 20px 0;
            box-shadow: 0 4px 15px rgba(77, 166, 255, 0.3);
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #4da6ff;
        }

        /* Área das Frases */
        #frase {
            font-size: 20px;
            min-height: 80px;
            margin: 30px 0;
            transition: opacity 0.5s ease;
            font-style: italic;
            color: #a3d2ff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Animação de Confetes */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            top: -10px;
            z-index: 0;
            animation: fall linear infinite;
        }

        @keyframes fall {
from {
transform: translateY(0);
}
to {
transform: translateY(100vh) rotate(360deg);
}
}

        #countdown {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- TELA DE BLOQUEIO -->
        <div id="lock">
            <h1>💙 Algo está sendo preparado...</h1>
            <p>Aguarde o momento especial:</p>
            <div id="countdown"></div>
        </div>

        <!-- CONTEÚDO REVELADO -->
        <div id="content" class="hidden">
            <h1>Marianne 💙</h1>
            
            <button onclick="tocar"(https://open.spotify.com/search/seu%20nome)">🎶 Ouvir nossa música</button>

            <h2>📝 Coisas que admiro em você</h2>
            <div id="frase">Carregando motivos...</div>

            <h2>💌</h2>
            <p>
                Aproveita muito seu dia, que seja incrível, cheio de amor, risada e carinho<br><br>
                Obrigada por cada riso, cada susto, cada momento, você é foda.<br><br>
                <strong>Feliz aniversário, meu bem. 💙</strong>
            </p>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO DA DATA ---
        const releaseDate = new Date("2026-02-02T00:00:00-03:00");

        function update() {
            const now = new Date();
            const diff = releaseDate - now;

            if (diff <= 0) {
                document.getElementById("lock").style.display = "none";
                document.getElementById("content").classList.remove("hidden");
                iniciarFrases(); // Começa o ciclo de frases
                confetti();      // Solta os confetes
                clearInterval(timerInterval);
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / (1000 * 60)) % 60);
            const s = Math.floor((diff / 1000) % 60);

            document.getElementById("countdown").innerHTML = `${d}d ${h}h ${m}m ${s}s`;
        }

        const timerInterval = setInterval(update, 1000);
        update();

        // --- LÓGICA DAS FRASES ---
        const frases = [
            "você é inspiradora, é engraçada, é genuina, é corajosa, é espontanea"
            "Feliz aniversário, meu bem! 💙"
        ];

        let index = 0;
        const fraseEl = document.getElementById("frase");

        function mostrarProximaFrase() {
            fraseEl.style.opacity = 0;
            
            setInterval(mostrarProximaFrase, 5000);
                fraseEl.innerHTML = frases[index];
                fraseEl.style.opacity = 1;
                index = (index + 1) % frases.length; // Ciclo infinito
            }, 500);
        }

        function iniciarFrases() {
            mostrarProximaFrase();
            setInterval(mostrarProximaFrase, 5000); // Muda a cada 5 segundos
        }

        // --- MÚSICA ---
        function tocar() {
            window.open("https://open.spotify.com/search/seu%20nome", "_blank");
        }

        // --- EFEITO DE CONFETES ---
        function confetti() {
            setInterval(() => {
                const el = document.createElement("div");
                el.className = "confetti";
                el.style.left = Math.random() * 100 + "vw";
                el.style.background = ["#4da6ff", "#3399ff", "#ffffff", "#b3d9ff"][Math.floor(Math.random() * 4)];
                el.style.borderRadius = "50%";
                el.style.animationDuration = (Math.random() * 3 + 2) + "s";
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 5000);
            }, 300);
        }
    </script>
</body>
</html>
