<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Marianne 💙</title>

<style>
body{
background: linear-gradient(180deg, #050a1f, #0a1f4d, #050a1f);
color:white;
font-family:Arial;
margin:0;
text-align:center;
overflow-x:hidden;
}

.container{
max-width:700px;
margin:auto;
padding:40px 20px;
}

h1,h2{
color:#4da6ff;
text-shadow:0 0 10px #4da6ff;
}

.hidden{
display:none;
}

button{
background: linear-gradient(180deg, #050a1f, #0a1f4d, #050a1f);
border:none;
padding:12px 25px;
border-radius:20px;
cursor:pointer;
margin-top:20px;
}

#frase{
font-size:22px;
margin-top:40px;
transition:0.5s;
}

.confetti{
position:fixed;
width:8px;
height:8px;
top:-10px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(100vh) rotate(360deg);
}
}
</style>
</head>

<body>

<div class="container">

<div id="lock">
<h1>💙 Algo está sendo preparado...</h1>
<p>Volte em:</p>
<div id="countdown"></div>
</div>

<div id="content" class="hidden">

<h1>Marianne 💙</h1>

<button onclick="tocar()">🎶 Tocar música</button>

<h2>📝 coisas incríveis e únicas suas</h2>

<div id="frase"></div>

<h2>💌</h2>

<p>
Algumas histórias não precisam de rótulo.<br><br>
Obrigada por cada riso, cada susto, cada momento.<br><br>
Feliz 37 anos, meu bem. 💙
</p>

</div>

</div>

<script>

// DATA CORRETA
const releaseDate = new Date("2026-03-04T00:00:00-03:00");

function update(){
const now = new Date();
const diff = releaseDate - now;

if(diff <= 0){
document.getElementById("lock").style.display="none";
document.getElementById("content").classList.remove("hidden");
confetti();
return;
}

const d = Math.floor(diff/(1000*60*60*24));
const h = Math.floor((diff/(1000*60*60))%24);
const m = Math.floor((diff/(1000*60))%60);
const s = Math.floor((diff/1000)%60);

document.getElementById("countdown").innerHTML =
d+"d "+h+"h "+m+"m "+s+"s";
}

setInterval(update,1000);

// FRASES INTERATIVAS
const frases = [
"Meu bem 💙",
"A memória de Dory 🐠",
"O seu susto fácil (os gritinhos)",
"A sua criatividade com nomes aleatórios",
"O seu senso de humor",
"A sua leveza",
"O brilho nos seus olhos quando fala do que ama",
"O pé pra fora da cama 🫣",
"O sono quando tocam nas suas mãos",
"O livro que você escreve 📖",
"A forma que você pensa",
"A sua risada",
"A sua espontaneidade",
"E tudo que você é",
"Feliz 37 anos 💙"
];

let index = 0;

function mostrarFrase(){
const el = document.getElementById("frase");

el.style.opacity = 0;

setTimeout(()=>{
el.innerHTML = frases[index];
el.style.opacity = 1;
index++;
},300);

if(index >= frases.length){
index = frases.length -1;
}
}

document.body.addEventListener("click", mostrarFrase);

// inicia primeira frase
mostrarFrase();

// BOTÃO MÚSICA
function tocar(){
window.open("https://open.spotify.com/track/0PgsB53yhlKs8D19LgYU4i", "_blank");
}

// CONFETE AZUL
function confetti(){
setInterval(()=>{
const el = document.createElement("div");
el.className="confetti";
el.style.left=Math.random()*100+"vw";
el.style.background=["#4da6ff","#3399ff","#1a75ff","#66b3ff"][Math.floor(Math.random()*4)];
el.style.borderRadius="50%";
el.style.animationDuration=(Math.random()*3+2)+"s";
document.body.appendChild(el);
setTimeout(()=>el.remove(),5000);
},200);
}

</script>

</body>
</html>
